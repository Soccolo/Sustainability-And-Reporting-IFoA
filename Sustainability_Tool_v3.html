        // ============================================
        // DOCUMENT COMPARISON COMPONENT
        // ============================================
        function DocumentComparison() {
            const [file, setFile] = useState(null);
            const [fileName, setFileName] = useState('');
            const [totalPages, setTotalPages] = useState(0);
            const [startPage, setStartPage] = useState(1);
            const [endPage, setEndPage] = useState(1);
            const [selectedFramework, setSelectedFramework] = useState('TCFD');
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [progressText, setProgressText] = useState('');
            const [results, setResults] = useState(null);
            const [unusedRecommendations, setUnusedRecommendations] = useState([]);
            const [model, setModel] = useState(null);
            const [modelLoading, setModelLoading] = useState(false);
            const [isDragOver, setIsDragOver] = useState(false);
            const fileInputRef = useRef(null);

            // Load the Universal Sentence Encoder model
            const loadModel = async () => {
                if (model) return model;
                setModelLoading(true);
                setProgressText('Loading AI model (this may take a moment)...');
                try {
                    const loadedModel = await use.load();
                    setModel(loadedModel);
                    setModelLoading(false);
                    return loadedModel;
                } catch (error) {
                    console.error('Error loading model:', error);
                    setModelLoading(false);
                    throw error;
                }
            };

            const extractTextFromPDF = async (pdfFile) => {
                const arrayBuffer = await pdfFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const pages = [];
                
                setTotalPages(pdf.numPages);
                setEndPage(pdf.numPages);
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const text = textContent.items.map(item => item.str).join(' ');
                    pages.push({
                        pageNumber: i,
                        text: text.replace(/\s+/g, ' ').trim()
                    });
                }
                
                return pages;
            };

            // Cosine similarity calculation
            const cosineSimilarity = (a, b) => {
                let dotProduct = 0;
                let normA = 0;
                let normB = 0;
                for (let i = 0; i < a.length; i++) {
                    dotProduct += a[i] * b[i];
                    normA += a[i] * a[i];
                    normB += b[i] * b[i];
                }
                if (normA === 0 || normB === 0) return 0;
                return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
            };

            const compareDocumentToFramework = async (allPages, framework, pageStart, pageEnd) => {
                const recommendations = frameworkRecommendations[framework];
                if (!recommendations || recommendations.length === 0) {
                    throw new Error(`No recommendations found for framework: ${framework}`);
                }

                // Filter pages based on start/end
                const pages = allPages.filter(p => p.pageNumber >= pageStart && p.pageNumber <= pageEnd);
                
                if (pages.length === 0) {
                    throw new Error('No pages in selected range');
                }

                const useModel = await loadModel();
                
                // Encode all recommendations
                setProgressText('Encoding framework recommendations...');
                setProgress(35);
                const recTexts = recommendations.map(r => r.recommendation);
                const recEmbeddings = await useModel.embed(recTexts);
                const recVectors = await recEmbeddings.array();

                const results = [];
                const usedRecommendations = new Set();

                // Process each page
                for (let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    
                    // Skip nearly empty pages
                    if (!page.text || page.text.length < 50) {
                        continue;
                    }

                    setProgressText(`Analyzing page ${page.pageNumber} of ${pageEnd}...`);
                    setProgress(35 + ((i + 1) / pages.length) * 60);
                    
                    // Encode the page text
                    const pageEmbedding = await useModel.embed([page.text]);
                    const pageVector = (await pageEmbedding.array())[0];

                    let maxSimilarity = -1;
                    let secondMaxSimilarity = -1;
                    let bestMatch = null;
                    let secondBestMatch = null;

                    // Compare with each recommendation
                    for (let j = 0; j < recommendations.length; j++) {
                        const similarity = cosineSimilarity(pageVector, recVectors[j]);
                        if (similarity > maxSimilarity) {
                            // Current best becomes second best
                            secondMaxSimilarity = maxSimilarity;
                            secondBestMatch = bestMatch;
                            // New best
                            maxSimilarity = similarity;
                            bestMatch = {
                                ...recommendations[j],
                                similarity: similarity
                            };
                        } else if (similarity > secondMaxSimilarity) {
                            // New second best
                            secondMaxSimilarity = similarity;
                            secondBestMatch = {
                                ...recommendations[j],
                                similarity: similarity
                            };
                        }
                    }

                    if (bestMatch) {
                        results.push({
                            pageNumber: page.pageNumber,
                            pagePreview: page.text.substring(0, 300) + '...',
                            topic: bestMatch.topic,
                            reference: bestMatch.reference,
                            recommendation: bestMatch.recommendation,
                            similarity: bestMatch.similarity,
                            // Second best
                            secondTopic: secondBestMatch ? secondBestMatch.topic : null,
                            secondReference: secondBestMatch ? secondBestMatch.reference : null,
                            secondRecommendation: secondBestMatch ? secondBestMatch.recommendation : null,
                            secondSimilarity: secondBestMatch ? secondBestMatch.similarity : null
                        });
                        usedRecommendations.add(bestMatch.recommendation);
                    }
                }

                // Find unused recommendations
                const unused = recommendations.filter(r => !usedRecommendations.has(r.recommendation));

                setProgress(100);
                setProgressText('Analysis complete!');

                return { results, unused };
            };

            const handleFileSelect = async (selectedFile) => {
                if (selectedFile && selectedFile.type === 'application/pdf') {
                    setFile(selectedFile);
                    setFileName(selectedFile.name);
                    setResults(null);
                    setUnusedRecommendations([]);
                    
                    // Extract page count
                    try {
                        const arrayBuffer = await selectedFile.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        setTotalPages(pdf.numPages);
                        setStartPage(1);
                        setEndPage(pdf.numPages);
                    } catch (error) {
                        console.error('Error reading PDF:', error);
                    }
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragOver(false);
                const droppedFile = e.dataTransfer.files[0];
                handleFileSelect(droppedFile);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragOver(true);
            };

            const handleDragLeave = () => {
                setIsDragOver(false);
            };

            const handleAnalyze = async () => {
                if (!file) return;

                setIsProcessing(true);
                setProgress(0);
                setResults(null);
                setUnusedRecommendations([]);

                try {
                    setProgressText('Extracting text from PDF...');
                    setProgress(10);
                    
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const allPages = [];
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const text = textContent.items.map(item => item.str).join(' ');
                        allPages.push({
                            pageNumber: i,
                            text: text.replace(/\s+/g, ' ').trim()
                        });
                        setProgress(10 + (i / pdf.numPages) * 20);
                        setProgressText(`Extracting page ${i} of ${pdf.numPages}...`);
                    }
                    
                    const { results: analysisResults, unused } = await compareDocumentToFramework(
                        allPages, 
                        selectedFramework, 
                        startPage, 
                        endPage
                    );
                    
                    setResults(analysisResults);
                    setUnusedRecommendations(unused);
                } catch (error) {
                    console.error('Error processing document:', error);
                    setProgressText(`Error: ${error.message}`);
                } finally {
                    setIsProcessing(false);
                }
            };

            const getSimilarityColor = (score) => {
                if (score >= 0.6) return 'text-green-400';
                if (score >= 0.4) return 'text-blue-400';
                if (score >= 0.15) return 'text-yellow-400';
                return 'text-red-400';
            };

            const getSimilarityBg = (score) => {
                if (score >= 0.6) return 'bg-green-500';
                if (score >= 0.4) return 'bg-blue-500';
                if (score >= 0.15) return 'bg-yellow-500';
                return 'bg-red-400';
            };

            return (
                <div className="w-full min-h-screen bg-slate-900 text-white p-6 overflow-auto">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold mb-2">Document Comparison Tool</h1>
                        <p className="text-slate-400 mb-6">Upload your document and compare it against sustainability framework recommendations</p>

                        {/* Upload and Configuration Section */}
                        <div className="bg-slate-800 rounded-lg p-6 mb-6">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {/* File Upload */}
                                <div>
                                    <label className="block text-lg font-semibold mb-3">1. Upload PDF Document</label>
                                    <div
                                        className={`upload-zone rounded-xl p-8 text-center cursor-pointer transition-all ${isDragOver ? 'drag-over' : ''}`}
                                        onClick={() => fileInputRef.current?.click()}
                                        onDrop={handleDrop}
                                        onDragOver={handleDragOver}
                                        onDragLeave={handleDragLeave}
                                    >
                                        <input
                                            ref={fileInputRef}
                                            type="file"
                                            accept=".pdf"
                                            onChange={(e) => handleFileSelect(e.target.files[0])}
                                            className="hidden"
                                        />
                                        {fileName ? (
                                            <div>
                                                <div className="text-4xl mb-3">📄</div>
                                                <p className="text-white font-medium">{fileName}</p>
                                                <p className="text-slate-400 text-sm mt-1">{totalPages} pages • Click or drag to replace</p>
                                            </div>
                                        ) : (
                                            <div>
                                                <div className="text-4xl mb-3">📤</div>
                                                <p className="text-white font-medium">Drop your PDF here</p>
                                                <p className="text-slate-400 text-sm mt-1">or click to browse</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Page Range Selection */}
                                    {totalPages > 0 && (
                                        <div className="mt-4 p-4 bg-slate-700 rounded-lg">
                                            <label className="block text-sm font-medium text-slate-300 mb-3">
                                                Page Range (skip covers, contents, disclaimers)
                                            </label>
                                            <div className="flex items-center gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-xs text-slate-400 mb-1">Start Page</label>
                                                    <input
                                                        type="number"
                                                        min="1"
                                                        max={totalPages}
                                                        value={startPage}
                                                        onChange={(e) => setStartPage(Math.max(1, Math.min(totalPages, parseInt(e.target.value) || 1)))}
                                                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                                    />
                                                </div>
                                                <div className="text-slate-400 pt-5">to</div>
                                                <div className="flex-1">
                                                    <label className="block text-xs text-slate-400 mb-1">End Page</label>
                                                    <input
                                                        type="number"
                                                        min="1"
                                                        max={totalPages}
                                                        value={endPage}
                                                        onChange={(e) => setEndPage(Math.max(1, Math.min(totalPages, parseInt(e.target.value) || totalPages)))}
                                                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                                    />
                                                </div>
                                            </div>
                                            <p className="text-xs text-slate-400 mt-2">
                                                Analyzing {Math.max(0, endPage - startPage + 1)} of {totalPages} pages
                                            </p>
                                        </div>
                                    )}
                                </div>

                                {/* Framework Selection */}
                                <div>
                                    <label className="block text-lg font-semibold mb-3">2. Select Framework</label>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">
                                        {Object.keys(frameworkRecommendations).map(framework => (
                                            <button
                                                key={framework}
                                                onClick={() => setSelectedFramework(framework)}
                                                className={`w-full px-4 py-3 rounded-lg text-left transition-all flex items-center justify-between ${
                                                    selectedFramework === framework
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                                }`}
                                            >
                                                <span className="font-medium">{framework}</span>
                                                <span className="text-sm opacity-75">
                                                    {frameworkRecommendations[framework].length} recommendations
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Analyze Button */}
                            <div className="mt-6">
                                <button
                                    onClick={handleAnalyze}
                                    disabled={!file || isProcessing || modelLoading}
                                    className={`w-full py-4 rounded-xl font-semibold text-lg transition-all ${
                                        !file || isProcessing || modelLoading
                                            ? 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                            : 'bg-gradient-to-r from-blue-600 to-purple-600 text-white hover:shadow-lg hover:shadow-blue-500/25'
                                    }`}
                                >
                                    {modelLoading ? '🔄 Loading AI Model...' : 
                                     isProcessing ? '⚙️ Analyzing...' : 
                                     `🔍 Analyze Pages ${startPage}-${endPage} Against ${selectedFramework}`}
                                </button>
                            </div>

                            {/* Progress Bar */}
                            {isProcessing && (
                                <div className="mt-4 fade-in">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm text-slate-400">{progressText}</span>
                                        <span className="text-sm font-mono text-white">{Math.round(progress)}%</span>
                                    </div>
                                    <div className="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
                                        <div
                                            className="progress-bar h-full transition-all duration-300"
                                            style={{ width: `${progress}%` }}
                                        />
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Results Section */}
                        {results && results.length > 0 && (
                            <div className="space-y-6 fade-in">
                                {/* Summary Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-slate-800 rounded-xl p-6 text-center">
                                        <div className="text-3xl font-bold text-blue-400">{results.length}</div>
                                        <div className="text-slate-400 text-sm mt-1">Pages Analyzed</div>
                                    </div>
                                    <div className="bg-slate-800 rounded-xl p-6 text-center">
                                        <div className="text-3xl font-bold text-green-400">
                                            {new Set(results.map(r => r.recommendation)).size}
                                        </div>
                                        <div className="text-slate-400 text-sm mt-1">Recommendations Matched</div>
                                    </div>
                                    <div className="bg-slate-800 rounded-xl p-6 text-center">
                                        <div className="text-3xl font-bold text-yellow-400">{unusedRecommendations.length}</div>
                                        <div className="text-slate-400 text-sm mt-1">Unused Recommendations</div>
                                    </div>
                                    <div className="bg-slate-800 rounded-xl p-6 text-center">
                                        <div className="text-3xl font-bold text-purple-400">
                                            {(results.reduce((acc, r) => acc + r.similarity, 0) / results.length * 100).toFixed(1)}%
                                        </div>
                                        <div className="text-slate-400 text-sm mt-1">Avg Similarity</div>
                                    </div>
                                </div>

                                {/* Page-by-Page Results */}
                                <div className="bg-slate-800 rounded-lg p-6">
                                    <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                                        <span>📋</span> Page-by-Page Analysis
                                    </h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="border-b-2 border-slate-700">
                                                    <th className="text-left py-3 px-4 font-semibold text-slate-300 w-20">Page</th>
                                                    <th className="text-left py-3 px-4 font-semibold text-slate-300">Rank</th>
                                                    <th className="text-left py-3 px-4 font-semibold text-slate-300">Topic</th>
                                                    <th className="text-left py-3 px-4 font-semibold text-slate-300">Matching Recommendation</th>
                                                    <th className="text-right py-3 px-4 font-semibold text-slate-300 w-32">Similarity</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.map((result, index) => (
                                                    <React.Fragment key={index}>
                                                        {/* Best Match Row */}
                                                        <tr className="border-b border-slate-700/50 hover:bg-slate-750 transition-colors">
                                                            <td className="py-4 px-4" rowSpan={result.secondRecommendation ? 2 : 1}>
                                                                <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-slate-700 font-bold text-white">
                                                                    {result.pageNumber}
                                                                </span>
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <span className="px-2 py-1 rounded text-xs font-bold bg-green-500/20 text-green-300">
                                                                    1st
                                                                </span>
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <span className="px-3 py-1 rounded-full text-xs font-medium bg-blue-500/20 text-blue-300">
                                                                    {result.topic}
                                                                </span>
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <div className="text-white text-sm">{result.recommendation}</div>
                                                                <div className="text-slate-500 text-xs mt-1">{result.reference}</div>
                                                            </td>
                                                            <td className="py-4 px-4 text-right">
                                                                <div className="flex items-center justify-end gap-2">
                                                                    <div className="w-16 bg-slate-700 rounded-full h-2 overflow-hidden">
                                                                        <div
                                                                            className={`h-full ${getSimilarityBg(result.similarity)}`}
                                                                            style={{ width: `${Math.min(result.similarity * 100, 100)}%` }}
                                                                        />
                                                                    </div>
                                                                    <span className={`font-mono font-bold ${getSimilarityColor(result.similarity)}`}>
                                                                        {(result.similarity * 100).toFixed(1)}%
                                                                    </span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                        {/* Second Best Match Row */}
                                                        {result.secondRecommendation && (
                                                            <tr className="border-b border-slate-700 hover:bg-slate-750 transition-colors bg-slate-800/50">
                                                                <td className="py-3 px-4">
                                                                    <span className="px-2 py-1 rounded text-xs font-bold bg-slate-600/50 text-slate-300">
                                                                        2nd
                                                                    </span>
                                                                </td>
                                                                <td className="py-3 px-4">
                                                                    <span className="px-3 py-1 rounded-full text-xs font-medium bg-slate-600/30 text-slate-400">
                                                                        {result.secondTopic}
                                                                    </span>
                                                                </td>
                                                                <td className="py-3 px-4">
                                                                    <div className="text-slate-300 text-sm">{result.secondRecommendation}</div>
                                                                    <div className="text-slate-500 text-xs mt-1">{result.secondReference}</div>
                                                                </td>
                                                                <td className="py-3 px-4 text-right">
                                                                    <div className="flex items-center justify-end gap-2">
                                                                        <div className="w-16 bg-slate-700 rounded-full h-2 overflow-hidden">
                                                                            <div
                                                                                className={`h-full ${getSimilarityBg(result.secondSimilarity)}`}
                                                                                style={{ width: `${Math.min(result.secondSimilarity * 100, 100)}%` }}
                                                                            />
                                                                        </div>
                                                                        <span className={`font-mono font-bold ${getSimilarityColor(result.secondSimilarity)}`}>
                                                                            {(result.secondSimilarity * 100).toFixed(1)}%
                                                                        </span>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        )}
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Unused Recommendations */}
                                {unusedRecommendations.length > 0 && (
                                    <div className="bg-slate-800 rounded-lg p-6">
                                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                                            <span>⚠️</span> Unused Recommendations
                                            <span className="text-sm font-normal text-slate-400 ml-2">
                                                ({unusedRecommendations.length} not matched as best fit for any page)
                                            </span>
                                        </h3>
                                        <p className="text-slate-400 text-sm mb-4">
                                            The following {selectedFramework} recommendations were not the best match for any page in your document:
                                        </p>
                                        <div className="space-y-3">
                                            {unusedRecommendations.map((rec, index) => (
                                                <div
                                                    key={index}
                                                    className="bg-slate-700 rounded-lg p-4 border-l-4 border-yellow-500/50"
                                                >
                                                    <div className="flex items-start gap-3">
                                                        <span className="px-2 py-1 rounded text-xs font-medium bg-yellow-500/20 text-yellow-300 shrink-0">
                                                            {rec.topic}
                                                        </span>
                                                        <div>
                                                            <div className="text-white text-sm">{rec.recommendation}</div>
                                                            <div className="text-slate-500 text-xs mt-1">{rec.reference}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Help Section */}
                        {!results && (
                            <div className="bg-slate-800 rounded-lg p-6">
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span>💡</span> How it works
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div className="text-center">
                                        <div className="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center mx-auto mb-3">
                                            <span className="text-2xl">1️⃣</span>
                                        </div>
                                        <h4 className="text-white font-medium mb-1">Upload Document</h4>
                                        <p className="text-slate-400 text-sm">Upload your sustainability report or climate disclosure PDF</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="w-12 h-12 rounded-xl bg-purple-500/20 flex items-center justify-center mx-auto mb-3">
                                            <span className="text-2xl">2️⃣</span>
                                        </div>
                                        <h4 className="text-white font-medium mb-1">Set Page Range</h4>
                                        <p className="text-slate-400 text-sm">Skip covers, contents pages, and disclaimers by setting start/end pages</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center mx-auto mb-3">
                                            <span className="text-2xl">3️⃣</span>
                                        </div>
                                        <h4 className="text-white font-medium mb-1">Select Framework</h4>
                                        <p className="text-slate-400 text-sm">Choose which sustainability framework to compare against</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="w-12 h-12 rounded-xl bg-yellow-500/20 flex items-center justify-center mx-auto mb-3">
                                            <span className="text-2xl">4️⃣</span>
                                        </div>
                                        <h4 className="text-white font-medium mb-1">Get Results</h4>
                                        <p className="text-slate-400 text-sm">See which recommendations each page aligns with, and which are missing</p>
                                    </div>
                                </div>
                                <div className="mt-6 p-4 bg-slate-700 rounded-lg">
                                    <p className="text-sm text-slate-300">
                                        <strong>Note:</strong> This tool uses the Universal Sentence Encoder for semantic similarity matching. 
                                        Color coding: <span className="text-green-400 font-medium">Green (≥60%)</span> = High, 
                                        <span className="text-blue-400 font-medium"> Blue (≥40%)</span> = Moderate, 
                                        <span className="text-yellow-400 font-medium"> Yellow (≥15%)</span> = Low-Moderate, 
                                        <span className="text-red-400 font-medium"> Red (&lt;15%)</span> = Low similarity.
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================
        // MAIN APP WITH NAVIGATION
        // ============================================
        function App() {
            const [currentPage, setCurrentPage] = useState('map');

            return (
                <div className="min-h-screen bg-slate-900">
                    {/* Navigation */}
                    <nav className="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                                        <span className="text-xl">🌍</span>
                                    </div>
                                    <div>
                                        <h1 className="text-white font-bold text-lg">Sustainability Framework Tool</h1>
                                        <p className="text-slate-400 text-xs">Climate & ESG Analysis Platform</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => setCurrentPage('map')}
                                        className={`nav-tab px-5 py-2.5 rounded-lg font-medium text-sm ${
                                            currentPage === 'map'
                                                ? 'active text-white'
                                                : 'text-slate-300 hover:bg-slate-700'
                                        }`}
                                    >
                                        📊 Framework Map
                                    </button>
                                    <button
                                        onClick={() => setCurrentPage('comparison')}
                                        className={`nav-tab px-5 py-2.5 rounded-lg font-medium text-sm ${
                                            currentPage === 'comparison'
                                                ? 'active text-white'
                                                : 'text-slate-300 hover:bg-slate-700'
                                        }`}
                                    >
                                        📄 Document Comparison
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Page Content */}
                    {currentPage === 'map' ? <FrameworkAdoptionMap /> : <DocumentComparison />}
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

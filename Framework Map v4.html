            };

            useEffect(() => {
                try {
                    const csvData = allMetricsData[selectedMetric];
                    const parsed = Papa.parse(csvData, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true
                    });
                    
                    const cleanedData = parsed.data.map(row => ({
                        framework1: row['Framework 1'],
                        framework2: row['Framework 2'],
                        similarity: row['Similarity']
                    }));
                    
                    setSimilarityData(cleanedData);
                    setIsLoading(false);
                } catch (error) {
                    console.error("Error loading data:", error);
                    setIsLoading(false);
                }
            }, [selectedMetric]);

            const adoptionDict = {
                "TCFD": ["Canada", "France", "Germany", "Italy", "Japan", "United Kingdom", "USA", "New Zealand", "Switzerland", "Singapore", "Brazil", "China", "South Africa"],
                "TNFD": ["Brazil", "China", "Colombia", "Costa Rica", "Egypt", "India", "Indonesia", "Kenya", "Malaysia", "Mexico", "Morocco", "Nigeria", "Peru", "Philippines", "South Africa"],
                "PRA": ["United Kingdom"],
                "IFRS": ["Turkey", "Bangladesh", "Brazil", "Australia", "Japan", "United Kingdom", "Canada", "Singapore", "New Zealand", "Nigeria", "South Africa", "Malaysia", "China"],
                "TPT": ["United Kingdom"],
                "BMA": ["Bermuda"],
                "MAS": ["Singapore"],
                "ESRS": ["Austria", "Belgium", "Bulgaria", "Croatia", "Cyprus", "Czech Republic", "Denmark", "Estonia", "Finland", "France", "Germany", "Greece", "Hungary", "Ireland", "Italy", "Latvia", "Lithuania", "Luxembourg", "Malta", "Netherlands", "Poland", "Portugal", "Romania", "Slovakia", "Slovenia", "Spain", "Sweden"],
                "OSFI": ["Canada"],
                "SBTi": ["Japan", "United Kingdom", "USA", "China", "Germany", "France", "India", "Italy", "Canada", "South Korea", "Mexico", "Brazil", "Australia", "South Africa", "Turkey", "Romania", "Malta"]
            };

            const frameworkColors = {
                "TCFD": "#3b82f6",
                "TNFD": "#10b981",
                "PRA": "#f59e0b",
                "IFRS": "#ef4444",
                "TPT": "#8b5cf6",
                "BMA": "#ec4899",
                "MAS": "#14b8a6",
                "ESRS": "#f97316",
                "OSFI": "#06b6d4",
                "SBTi": "#a855f7"
            };

            const countryCoords = {
                "Canada": { x: -7, y: 20 },
                "USA": { x: -7, y: 30 },
                "Mexico": { x: -5, y: 38 },
                "Brazil": { x: 23, y: 56 },
                "Colombia": { x: 10, y: 48},
                "Costa Rica": { x: 5, y: 44 },

                "Switzerland": { x: 54, y: 24 },
                "Austria": { x: 56, y: 24 },
                "Belgium": { x: 52.5, y: 21.5 },
                "Netherlands": { x: 53.5, y: 20.5 },
                "Poland": { x: 59, y: 21.5 },
                "Sweden": { x: 58, y: 17 },
                "Denmark": { x: 56, y: 19.5 },
                "Finland": { x: 64, y: 16 },

                "Portugal": { x: 46, y: 28 },
                "Ireland": { x: 46, y: 20 },
                "Bulgaria": { x: 63.5, y: 26 },

                "Luxembourg": { x: 53, y: 22 },
                "Turkey": { x: 68, y: 29 },
                "Egypt": { x: 67, y: 35 },
                "Morocco": { x: 47, y: 32 },
                "South Africa": { x: 62, y: 67 },
                "Nigeria": { x: 55, y: 45 },
                "Kenya": { x: 71, y: 52 },
                "Japan": { x: 127, y: 29 },
                "South Korea": { x: 120, y: 30 },
                "China": { x: 110, y: 29 },
                "India": { x: 92.5, y: 38 },
                "Singapore": { x: 108, y: 49 },
                "Malaysia": { x: 112, y: 48 },
                "Indonesia": { x: 110, y: 54 },
                "Philippines": { x: 117, y: 45 },
                "Bangladesh": { x: 98.5, y: 37 },
                "Australia": { x: 125, y: 65 },
                "New Zealand": { x: 145, y: 72 },
                "Bermuda": { x: 15, y: 32 }
            };

            function getCountryFrameworks(country) {
                const frameworks = [];
                Object.keys(adoptionDict).forEach(framework => {
                    if (adoptionDict[framework].includes(country)) {
                        frameworks.push(framework);
                    }
                });
                return frameworks;
            }

            function getFilteredCountries() {
                if (selectedFramework === 'ALL') {
                    const allCountries = new Set();
                    Object.values(adoptionDict).forEach(countries => {
                        countries.forEach(country => allCountries.add(country));
                    });
                    return Array.from(allCountries);
                }
                return adoptionDict[selectedFramework] || [];
            }

            function getSimilarityForFramework(framework) {
                if (!framework || framework === 'ALL' || similarityData.length === 0) return [];
                
                const similarities = similarityData
                    .filter(row => 
                        (row.framework1 === framework || row.framework2 === framework) &&
                        !isNaN(row.similarity)
                    )
                    .map(row => ({
                        otherFramework: row.framework1 === framework ? row.framework2 : row.framework1,
                        similarity: row.similarity
                    }));
                
                return similarities.sort((a, b) => 
                    sortOrder === 'desc' ? b.similarity - a.similarity : a.similarity - b.similarity
                );
            }

            const filteredCountries = getFilteredCountries();

            function getCountryColor(country) {
                const frameworks = getCountryFrameworks(country);
                if (selectedFramework === 'ALL') {
                    return frameworks.length > 3 ? '#dc2626' : frameworks.length > 1 ? '#f59e0b' : '#3b82f6';
                }
                return frameworkColors[selectedFramework] || '#3b82f6';
            }

            function getSimilarityColor(similarity) {
                if (similarity >= 0.5) return 'bg-green-600';
                if (similarity >= 0.4) return 'bg-green-700';
                if (similarity >= 0.3) return 'bg-yellow-600';
                if (similarity >= 0.2) return 'bg-orange-600';
                return 'bg-red-600';
            }

            const similarityTable = getSimilarityForFramework(selectedFramework);

            return (
                <div className="w-full min-h-screen bg-slate-900 text-white p-6 overflow-auto">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold mb-2">Climate & Sustainability Framework Adoption</h1>
                        <p className="text-slate-400 mb-6">Interactive map showing global adoption of regulatory frameworks</p>

                        <div className="bg-slate-800 rounded-lg p-4 mb-6">

                                onChange={(e) => setSelectedMetric(e.target.value)}

                            >

                                <option value="disclosure">Disclosure</option>
                                <option value="governance">Governance</option>
                                <option value="metrics">Metrics</option>
                                <option value="risk">Risk</option>
                                <option value="strategy">Strategy</option>
                            </select>
                        </div>

                        <div className="bg-slate-800 rounded-lg p-4 mb-6">

                                    onClick={() => setSelectedFramework('ALL')}
                                    className={`px-4 py-2 rounded-lg font-medium transition-all ${

                                            ? 'bg-slate-600 text-white'
                                            : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                    }`}
                                >
                                    All Frameworks
                                </button>
                                {Object.keys(adoptionDict).map(framework => (
                                    <button
                                        key={framework}
                                        onClick={() => setSelectedFramework(framework)}
                                        className={`px-4 py-2 rounded-lg font-medium transition-all ${
                                            selectedFramework === framework
                                                ? 'text-white'
                                                : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                        }`}
                                        style={{
                                            backgroundColor: selectedFramework === framework ? frameworkColors[framework] : undefined
                                        }}
                                    >
                                        {framework}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-800 rounded-lg p-6 mb-6">
                            <div className="relative w-full" style={{ paddingBottom: '52%' }}>
                                <div className="absolute inset-0 w-full h-full bg-slate-900 rounded overflow-hidden">
                                    <img 
                                        src="https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg" 
                                        alt="World Map"
                                        className="w-full h-full object-cover opacity-40"
                                        style={{ filter: 'brightness(0.7) contrast(1.2)' }}
                                    />
                                    <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full">
                                        {filteredCountries.map(country => {
                                            const coords = countryCoords[country];
                                            if (!coords) return null;
                                            
                                            const frameworks = getCountryFrameworks(country);
                                            const color = getCountryColor(country);
                                            const isHovered = hoveredCountry === country;
                                            
                                            return (
                                                <g key={country}>
                                                    <circle
                                                        cx={coords.x}
                                                        cy={coords.y}
                                                        r={selectedFramework === 'ALL' ? Math.min(0.8 + frameworks.length * 0.25, 2.2) : 1.5}
                                                        fill={color}
                                                        opacity={0.9}
                                                        onMouseEnter={() => setHoveredCountry(country)}
                                                        onMouseLeave={() => setHoveredCountry(null)}
                                                        className="cursor-pointer transition-all"
                                                        style={{
                                                            filter: isHovered ? 'brightness(1.4) drop-shadow(0 0 8px rgba(255,255,255,0.8))' : 'drop-shadow(0 0 3px rgba(0,0,0,0.5))',
                                                            stroke: isHovered ? 'white' : 'rgba(0,0,0,0.5)',
                                                            strokeWidth: isHovered ? '0.3' : '0.15'
                                                        }}
                                                    />
                                                    {isHovered && (
                                                        <React.Fragment>
                                                            <rect
                                                                x={coords.x - 8}
                                                                y={coords.y - 4.5}
                                                                width="16"
                                                                height="3"
                                                                fill="rgba(0,0,0,0.85)"
                                                                rx="0.5"
                                                                style={{ pointerEvents: 'none' }}
                                                            />
                                                            <text
                                                                x={coords.x}
                                                                y={coords.y - 2.5}
                                                                textAnchor="middle"
                                                                fontSize="1.8"
                                                                fill="white"
                                                                fontWeight="bold"
                                                                style={{ pointerEvents: 'none' }}
                                                            >
                                                                {country}
                                                            </text>
                                                        </React.Fragment>
                                                    )}
                                                </g>
                                            );
                                        })}
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {selectedFramework !== 'ALL' && !isLoading && similarityTable.length > 0 && (
                            <div className="bg-slate-800 rounded-lg p-6 mb-6">
                                <div className="flex items-center justify-between mb-4">
                                    <div>
                                        <h3 className="text-xl font-bold">Framework Similarity: {selectedFramework}</h3>
                                        <p className="text-sm text-slate-400 mt-1">
                                            Metric: {selectedMetric.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ')}
                                        </p>
                                    </div>
                                    <button
                                        onClick={() => setSortOrder(sortOrder === 'desc' ? 'asc' : 'desc')}
                                        className="flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-all"
                                    >
                                        <span>↕</span> Sort {sortOrder === 'desc' ? 'High to Low' : 'Low to High'}
                                    </button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead>
                                            <tr className="border-b-2 border-slate-700">
                                                <th className="text-left py-3 px-4 font-semibold">Framework</th>
                                                <th className="text-right py-3 px-4 font-semibold">Similarity Score</th>
                                                <th className="text-left py-3 px-4 font-semibold">Visualization</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {similarityTable.map((item, index) => (
                                                <tr key={index} className="border-b border-slate-700 hover:bg-slate-750 transition-colors">
                                                    <td className="py-3 px-4">
                                                        <div className="flex items-center gap-3">
                                                            <div
                                                                className="w-4 h-4 rounded"
                                                                style={{ backgroundColor: frameworkColors[item.otherFramework] || '#64748b' }}
                                                            />
                                                            <span className="font-medium text-lg">{item.otherFramework}</span>
                                                        </div>
                                                    </td>
                                                    <td className="py-3 px-4 text-right">
                                                        <span className="font-mono text-lg font-bold">{item.similarity.toFixed(4)}</span>
                                                    </td>
                                                    <td className="py-3 px-4">
                                                        <div className="flex items-center gap-3">
                                                            <div className="flex-1 bg-slate-700 rounded-full h-8 overflow-hidden">
                                                                <div
                                                                    className={`h-full ${getSimilarityColor(item.similarity)} transition-all duration-500 flex items-center justify-end pr-3`}
                                                                    style={{ width: `${Math.max(item.similarity * 100, 5)}%` }}
                                                                >
                                                                    <span className="text-xs font-bold text-white">
                                                                        {(item.similarity * 100).toFixed(1)}%
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="mt-4 p-3 bg-slate-700 rounded-lg">
                                    <p className="text-sm text-slate-300">
                                        <strong>Similarity Scale:</strong> Scores range from 0 to 1, where higher values indicate greater alignment between frameworks.
                                    </p>
                                </div>
                            </div>
                        )}

                        {selectedFramework !== 'ALL' && !isLoading && similarityTable.length === 0 && (
                            <div className="bg-slate-800 rounded-lg p-6 mb-6">
                                <div className="text-center py-8">
                                    <p className="text-slate-400 text-lg">
                                        No similarity data available for <strong className="text-white">{selectedFramework}</strong> under the <strong className="text-white">{selectedMetric.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ')}</strong> metric.
                                    </p>
                                    <p className="text-slate-500 text-sm mt-2">
                                        Try selecting a different metric or framework.
                                    </p>
                                </div>
                            </div>
                        )}

                        {hoveredCountry && (
                            <div className="bg-slate-800 rounded-lg p-4 mb-6">
                                <h3 className="text-xl font-bold mb-2">{hoveredCountry}</h3>
                                <p className="text-slate-400 mb-2">Adopted Frameworks:</p>
                                <div className="flex flex-wrap gap-2">
                                    {getCountryFrameworks(hoveredCountry).map(framework => (
                                        <span
                                            key={framework}
                                            className="px-3 py-1 rounded-full text-sm font-medium text-white"
                                            style={{ backgroundColor: frameworkColors[framework] }}
                                        >
                                            {framework}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-slate-800 rounded-lg p-4">
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
                                    <span>ℹ️</span> Framework Legend
                                </h3>
                                <div className="space-y-2">
                                    {Object.keys(adoptionDict).map(framework => (
                                        <div key={framework} className="flex items-center gap-3">
                                            <div
                                                className="w-4 h-4 rounded"
                                                style={{ backgroundColor: frameworkColors[framework] }}
                                            />
                                            <span className="font-medium">{framework}</span>
                                            <span className="text-slate-400 text-sm">
                                                ({adoptionDict[framework].length} countries)
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-slate-800 rounded-lg p-4">
                                <h3 className="text-lg font-semibold mb-3">Statistics</h3>
                                <div className="space-y-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Total Frameworks:</span>
                                        <span className="font-semibold">{Object.keys(adoptionDict).length}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Countries with noted adoption:</span>
                                        <span className="font-semibold">{filteredCountries.length}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Most Adopted:</span>
                                        <span className="font-semibold">
                                            {Object.entries(adoptionDict).sort((a, b) => b[1].length - a[1].length)[0][0]}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-800 rounded-lg p-4 mt-4">
                            <h3 className="text-lg font-semibold mb-2">About the Frameworks</h3>
                            <div className="text-sm text-slate-400 space-y-1">
                                <p><strong>TCFD</strong> - Task Force on Climate-related Financial Disclosures</p>
                                <p><strong>TNFD</strong> - Taskforce on Nature-related Financial Disclosures</p>
                                <p><strong>PRA</strong> - Prudential Regulation Authority</p>
                                <p><strong>IFRS</strong> - International Financial Reporting Standards</p>
                                <p><strong>TPT</strong> - Transition Plan Taskforce</p>
                                <p><strong>BMA</strong> - Bermuda Monetary Authority</p>
                                <p><strong>MAS</strong> - Monetary Authority of Singapore</p>
                                <p><strong>ESRS</strong> - European Sustainability Reporting Standards</p>
                                <p><strong>OSFI</strong> - Office of the Superintendent of Financial Institutions (Canada)</p>
                                <p><strong>SBTi</strong> - Science Based Targets initiative</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FrameworkAdoptionMap />);
    </script>
</body>
</html>
